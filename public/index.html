<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donezo - Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <main class="main-content">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="titles">
                <h1>Dashboard</h1>
                <p>Plan, prioritize, and accomplish your tasks with ease.</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="refreshDashboard()"><i class="fas fa-sync"></i> Refresh
                    Data</button>
            </div>
        </header>

        <!-- Stats Grid (4 Cards) -->
        <section class="stats-grid-4">
            <!-- Card 1 -->
            <div class="stat-card green-card">
                <div class="card-title">Total Cases Processed</div>
                <div class="card-value" id="total-cases">0</div>
                <div class="card-trend"><i class="fas fa-arrow-up"></i> Increased from last month</div>
                <div class="top-icon"><i class="fas fa-arrow-up" style="transform: rotate(45deg);"></i></div>
            </div>
            <!-- Card 2 -->
            <div class="stat-card">
                <div class="card-title">Pending Verification</div>
                <div class="card-value" id="pending-count">0</div>
                <div class="card-trend"><i class="fas fa-exclamation-circle" style="color:var(--warning);"></i> Action
                    required</div>
                <div class="top-icon"><i class="fas fa-arrow-up" style="transform: rotate(45deg);"></i></div>
            </div>
            <!-- Card 3 -->
            <div class="stat-card">
                <div class="card-title" style="color: var(--danger);">System Errors</div>
                <div class="card-value" id="error-logs-count">0</div>
                <div class="card-trend"><i class="fas fa-exclamation-triangle" style="color:var(--danger)"></i> Action
                    required</div>
                <div class="top-icon"><i class="fas fa-bug" style="color:var(--text-gray)"></i></div>
            </div>
            <!-- Card 4 -->
            <div class="stat-card">
                <div class="card-title">Time Saved</div>
                <div class="card-value" id="speed-to-lead">0</div>
                <div class="card-trend" style="background:transparent; padding:0; margin-top:12px;">Paralegal hours
                </div>
                <div class="top-icon"><i class="fas fa-bolt" style="color:var(--text-gray)"></i></div>
            </div>
        </section>

        <!-- Bottom Layout -->
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
            <!-- Live Queue (Full Width Replacement for Project Analytics/Collaboration depending on scale, but fitting it here perfectly replaces the charts/lists dynamically) -->
            <div class="unified-widget"
                style="grid-column: 1 / -1; height: 100%; overflow: hidden; display: flex; flex-direction: column;">
                <div class="widget-header">
                    <h3>Project (Live Intake Queue)</h3>
                    <button class="btn-outline"
                        style="border: 1px solid var(--border-color); padding: 6px 16px; border-radius: 20px; font-size:0.8rem; background:none; cursor:pointer;"><i
                            class="fas fa-plus"></i> New</button>
                </div>
                <div style="flex: 1; overflow-y: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Case ID</th>
                                <th>Accident Date</th>
                                <th>Confidence</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="cases-body">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="dashboard.js"></script>
</body>

</html>
