<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Case Data - Richards & Law</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body style="display: block;">
    <div id="loading" class="loading-overlay">
        <div class="stat-value"><i class="fas fa-spinner fa-spin"></i> Loading Case Details...</div>
    </div>

    <header class="header" style="margin: 2rem 2.5rem 1rem;">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <i class="fas fa-user-check" style="font-size: 1.5rem; color: var(--accent-gold);"></i>
            <div>
                <h1 id="page-title">Paralegal Verification UX</h1>
                <span class="date">Matter ID: <span id="matter-id-display">Loading...</span></span>
            </div>
        </div>
        <div id="confidence-badge-container" class="hidden">
            <span class="confidence-badge">Extraction Confidence: <span id="overall-confidence">0%</span></span>
        </div>
    </header>

    <main id="main-ui" class="main-content" style="margin-left: 0; padding-top: 1rem;">
        <div class="verification-layout">
            <!-- Left Panel: Extracted Data (Read-only) -->
            <div class="panel">
                <div class="panel-header">
                    <h3>AI Extracted Data</h3>
                    <div style="display: flex; gap: 8px;">
                        <button id="open-pdf-btn" class="badge badge-approved" style="cursor: pointer; display: none;"
                            onclick="openPDF()">
                            <i class="fas fa-file-pdf"></i> Open PDF Report
                        </button>
                        <span class="badge"
                            style="background: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff;">ORIGINAL
                            EXTRACT</span>
                    </div>
                </div>
                <div class="panel-content" id="extracted-view">
                    <!-- Fields injected via JS -->
                </div>
            </div>

            <!-- Right Panel: Editable Form -->
            <div class="panel">
                <div class="panel-header">
                    <h3>Data Verification & Corrections</h3>
                    <span class="badge"
                        style="background: #fffbe6; color: #faad14; border: 1px solid #ffe58f;">EDITABLE</span>
                </div>
                <form id="verify-form" class="panel-content">
                    <div id="form-fields">
                        <!-- Fields injected via JS -->
                    </div>

                    <div class="input-group">
                        <label class="info-label">Paralegal Notes</label>
                        <textarea id="paralegal-notes" rows="4"
                            placeholder="Add any observations or notes here..."></textarea>
                    </div>
                </form>

                <div class="actions">
                    <button type="button" class="btn btn-reject" onclick="handleAction('rejected')">
                        <i class="fas fa-times-circle"></i> Reject Case
                    </button>
                    <button type="button" class="btn btn-approve" onclick="handleAction('approved')">
                        <i class="fas fa-check-circle"></i> Approve & Sync to Clio
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Success Screen -->
    <div id="success-screen" class="main-content hidden"
        style="margin-left: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh;">
        <div class="success-screen">
            <div class="success-icon" id="status-icon"><i class="fas fa-check-circle"></i></div>
            <h2 id="success-title">Verification Complete</h2>
            <p id="success-message" style="color: var(--text-muted); margin-top: 1rem;">The data has been verified and
                synced to the Clio Manage matter.</p>
            <button class="badge badge-approved" style="margin-top: 2rem; padding: 12px 30px; cursor: pointer;"
                onclick="window.location.href='/'">
                Return to Dashboard
            </button>
        </div>
    </div>

    <script src="verify.js"></script>
</body>

</html>
